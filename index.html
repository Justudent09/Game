<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Universal Bracket</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* фон */
.bg {
    position: fixed;
    inset: 0;
    background: url('image/d4620c5b07a97bd1b3016e8a20ff634e.jpg')
    center/cover no-repeat;
    z-index: -1;
}

/* scroll */
.scroll-area {
    position: absolute;
    inset: 0;
    overflow: auto;
}

/* canvas */
.wrapper {
    margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));;
    position: relative;
    padding: 5vw;
}

/* матч */
.glass-card {
    position: absolute;
    width: 200px;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    backdrop-filter: blur(50px);
    overflow: hidden;
}

.title {
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
    padding: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    font-size: 12px;
}

.row + .row {
    border-top: 1px solid rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="scroll-area">
    <div class="wrapper" id="wrapper"></div>
</div>

<script>

/* =========================
   НАСТРОЙКИ
========================= */

const stepX = 260;
const stepY = 90;
const cardH = 70;

const wrapper = document.getElementById("wrapper");
const offset = window.innerWidth * 0.05;

/* =========================
   ИГРОКИ (ЛЮБОЕ КОЛИЧЕСТВО)
========================= */

let players = Array.from({length: 13}, (_, i) => ({
    name: "TEAM " + (i + 1)
}));

/* =========================
   СОЗДАНИЕ МАТЧА
========================= */

function createMatch(x, y, a, b=null) {

    const el = document.createElement("div");
    el.className = "glass-card";

    el.style.left = x + "px";
    el.style.top = y + "px";

    el.innerHTML = `
        <div class="title"></div>
        <div class="row"><span>${a.name}</span><span></span></div>
        <div class="row"><span>${b ? b.name : "BYE"}</span><span></span></div>
    `;

    wrapper.appendChild(el);
}

/* =========================
   ТУРНИР
========================= */

function run(list) {

    let round = 0;
    let positions = [];

    while (list.length > 1) {

        const next = [];

        for (let i = 0; i < list.length; i += 2) {

            const a = list[i];
            const b = list[i + 1];

            const y = i * stepY;

            createMatch(
                offset + round * stepX,
                y,
                a,
                b
            );

            // BYE или случайный победитель
            const winner = (!b)
                ? a
                : (Math.random() > 0.5 ? a : b);

            positions.push({
                y: y + cardH / 2,
                data: winner
            });
        }

        /* центровка следующего раунда */
        const grouped = [];

        for (let i = 0; i < positions.length; i += 2) {

            const A = positions[i];
            const B = positions[i + 1];

            const yCenter = B ? (A.y + B.y) / 2 : A.y;

            grouped.push({
                y: yCenter,
                data: A.data
            });
        }

        list = positions.map(p => p.data);
        positions = grouped;

        round++;
    }

    /* финал */
    if (list.length === 1) {
        createMatch(
            offset + round * stepX,
            positions[0]?.y || 0,
            list[0],
            null
        );
    }
}

run(players);

</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
