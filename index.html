<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bracket Random Players</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

.bg {
    position: fixed;
    inset: 0;
    background: url('image/f3285d30bff0ae4d484989ed725e356f.jpg')
    center/cover no-repeat;
    z-index: -1;
}

.scroll-area {
    position: absolute;
    inset: 0;
    overflow: auto;
    padding: 10vw;
    box-sizing: border-box;
}

.wrapper {
    margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
    position: relative;
    display: inline-block;
}

.glass-card {
    position: absolute;
    width: 200px;

    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    overflow: hidden;
}

.row {
    padding: 10px 12px;
    text-align: center;
}

.row + .row {
    border-top: 1px solid rgba(255,255,255,0.15);
}

.line {
    position: absolute;
    background: rgba(255,255,255,0.35);
}

.h-line { height: 2px; }
.v-line { width: 2px; }
</style>
</head>

<body>

<div class="bg"></div>

<div class="scroll-area">
    <div class="wrapper" id="wrapper"></div>
</div>

<script type="module">

import { getPlayers } from './app.js';

document.addEventListener("DOMContentLoaded", () => {

    const stepX = 260;
    const stepY = 50;
    const cardW = 200;
    const lineHalf = 1;

    const wrapper = document.getElementById("wrapper");
    const offset = 0;

    const players = getPlayers(); // 🔥 теперь из app.js

    function getCenterY(el) {
        return el.offsetTop + el.offsetHeight / 2;
    }

    function createMatch(x, y, a, b=null, isChampion=false) {
        const el = document.createElement("div");
        el.className = "glass-card";

        el.style.left = x + "px";
        el.style.top = y + "px";

        if (isChampion) {
            el.innerHTML = `
                <div class="row">ЧЕМПИОН</div>
                <div class="row"><b>${a.name}</b></div>
            `;
        } else if (!b) {
            el.innerHTML = `<div class="row">${a.name}</div>`;
        } else {
            el.innerHTML = `
                <div class="row">${a.name}</div>
                <div class="row">${b.name}</div>
            `;
        }

        wrapper.appendChild(el);
        return el;
    }

    function drawH(x, y, w) {
        const l = document.createElement("div");
        l.className = "line h-line";
        l.style.left = x + "px";
        l.style.top = (y - lineHalf) + "px";
        l.style.width = w + "px";
        wrapper.appendChild(l);
    }

    function drawV(x, y, h) {
        const l = document.createElement("div");
        l.className = "line v-line";
        l.style.left = (x - lineHalf) + "px";
        l.style.top = y + "px";
        l.style.height = h + "px";
        wrapper.appendChild(l);
    }

    function updateWrapperSize() {

        let minX = Infinity;
        let minY = Infinity;
        let maxX = 0;
        let maxY = 0;

        const elements = document.querySelectorAll(".glass-card, .line");

        elements.forEach(el => {
            const x = el.offsetLeft;
            const y = el.offsetTop;
            const w = el.offsetWidth;
            const h = el.offsetHeight;

            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + w);
            maxY = Math.max(maxY, y + h);
        });

        const padding = 50;

        const shiftX = padding - minX;
        const shiftY = padding - minY;

        elements.forEach(el => {
            el.style.left = (el.offsetLeft + shiftX) + "px";
            el.style.top = (el.offsetTop + shiftY) + "px";
        });

        wrapper.style.width = (maxX - minX + padding * 2) + "px";
        wrapper.style.height = (maxY - minY + padding * 2) + "px";
    }

    function run(list) {

        let round = 0;
        let current = [];

        for (let i = 0; i < list.length; i += 2) {

            const a = list[i];
            const b = list[i + 1];

            const y = i * stepY;

            const el = createMatch(offset, y, a, b);

            const winner = (!b)
                ? a
                : (Math.random() > 0.5 ? a : b);

            current.push({
                el,
                x: offset,
                data: winner
            });
        }

        round++;

        while (current.length > 1) {

            const next = [];

            for (let i = 0; i < current.length; i += 2) {

                const A = current[i];
                const B = current[i + 1];

                const el = createMatch(
                    offset + round * stepX,
                    0,
                    A.data,
                    B?.data
                );

                const centerA = getCenterY(A.el);
                const centerB = B ? getCenterY(B.el) : centerA;

                const center = (centerA + centerB) / 2;

                el.style.top = (center - el.offsetHeight / 2) + "px";

                const startX = A.x + cardW;
                const midX = startX + 30;
                const endX = offset + round * stepX;

                drawH(startX, centerA, 30);

                if (B) {
                    drawH(startX, centerB, 30);

                    drawV(
                        midX,
                        Math.min(centerA, centerB),
                        Math.abs(centerA - centerB)
                    );
                }

                drawH(midX, center, endX - midX);

                const winner =
                    (!B) ? A.data :
                    (Math.random() > 0.5 ? A.data : B.data);

                next.push({
                    el,
                    x: offset + round * stepX,
                    data: winner
                });
            }

            current = next;
            round++;
        }

        if (current.length === 1) {

            const A = current[0];

            const el = createMatch(
                offset + round * stepX,
                0,
                A.data,
                null,
                true
            );

            const center = getCenterY(A.el);

            el.style.top = (center - el.offsetHeight / 2) + "px";

            drawH(A.x + cardW, center, 60);
        }
    }

    run(players);
    requestAnimationFrame(updateWrapperSize);

});

</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
