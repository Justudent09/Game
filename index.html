<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tournament Bracket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        .bg { 
            position: fixed; 
            inset: 0; 
            background: url('https://raw.githubusercontent.com/Justudent09/Game/refs/heads/main/image/e37fc075a514c3bb2ea94d6349ea34ba.jpg') center/cover no-repeat; 
            z-index: -1; 
        }

        .scroll-area { 
            width: 100vw;
            height: 100vh;
            overflow-x: auto; 
            overflow-y: hidden;
            display: block;
            -webkit-overflow-scrolling: touch;
        }

        .wrapper { 
            position: relative; 
            /* Полный отступ сверху через padding, чтобы фон safe-area был прозрачным */
            padding-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
            padding-left: 5vw;
            padding-right: 5vw;
            min-width: 100%;
            height: 100%;
            display: inline-block;
            box-sizing: border-box;
        }

        .glass-card { 
            position: absolute; 
            width: 180px; 
            height: 80px; /* Фиксируем высоту для точности линий */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .row { 
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row:last-child { border-bottom: none; }

        .champion-text {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .line { 
            position: absolute; 
            background: rgba(255, 255, 255, 0.3); 
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scroll-area">
        <div class="wrapper" id="wrapper"></div>
    </div>
    <script src="players.js"></script>
    <script src="app.js"></script>
</body>
</html>
