<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Bracket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            overflow: hidden; 
            color: var(--tg-theme-text-color, white); 
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }
        .bg { 
            position: fixed; 
            inset: 0; 
            background: url('image/f3285d30bff0ae4d484989ed725e356f.jpg') center/cover no-repeat; 
            z-index: -1; 
        }
        .scroll-area { 
            position: absolute; 
            inset: 0; 
            overflow: auto; 
        }
        .wrapper { 
            position: relative; 
            display: inline-block; 
            min-width: 100%;
            /* Убираем margin-top, так как JS теперь сам добавит этот отступ в координаты */
        }
        .glass-card { 
            position: absolute; 
            width: 200px; 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px); 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }
        .champion-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
            text-transform: uppercase;
        }
        .row { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            white-space: nowrap;
        }
        .row:last-child { border-bottom: none; }
        .line { position: absolute; background: rgba(255,255,255,0.2); pointer-events: none; }
        .h-line { height: 2px; }
        .v-line { width: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scroll-area">
        <div class="wrapper" id="wrapper"></div>
    </div>
    <script src="players.js"></script>
    <script src="app.js"></script>
</body>
</html>
