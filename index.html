<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Турнир</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --glass: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
}

main {
    margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
    overflow: hidden;
    touch-action: none;
    padding: 20px;
}

/* КНОПКА */
button {
    padding: 10px 20px;
    margin-bottom: 20px;
    background: #222;
    border: none;
    color: white;
    border-radius: 10px;
}

/* СЕТКА */
.bracket {
    display: flex;
    gap: 40px;
    overflow-x: auto;
}

.round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
}

/* МАТОВОЕ СТЕКЛО */
.match {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 10px;
    border-radius: 12px;
    margin: 10px 0;
    min-width: 120px;
}

.player {
    padding: 5px;
    margin: 5px 0;
    border-radius: 6px;
    cursor: pointer;
}

.player:hover {
    background: rgba(255,255,255,0.2);
}

.winner {
    background: rgba(0,255,100,0.4);
}
</style>
</head>

<body>

<main>
    <button id="createBtn" style="display:none;">Создать турнир</button>
    <div class="bracket" id="bracket"></div>
</main>

<script src="app.js"></script>
</body>
</html>
