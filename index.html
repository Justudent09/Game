<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bracket Centered Champion</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

.bg {
    position: fixed;
    inset: 0;
    background: url('image/d4620c5b07a97bd1b3016e8a20ff634e.jpg')
    center/cover no-repeat;
    z-index: -1;
}

.scroll-area {
    position: absolute;
    inset: 0;
    overflow: auto;
}

.wrapper {
    margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
    position: relative;
    padding: 5vw;
}

/* ===== ТВОЙ ДИЗАЙН ===== */
.glass-card {
    position: absolute;
    width: 200px;

    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    overflow: hidden;
}

.row {
    padding: 10px 12px;
    text-align: center;   /* 🔥 ЦЕНТРИРУЕМ */
}

.row + .row {
    border-top: 1px solid rgba(255,255,255,0.15);
}

.value {
    opacity: 0.9;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="scroll-area">
    <div class="wrapper" id="wrapper"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const stepX = 260;
    const stepY = 50;
    const cardH = 70;

    const wrapper = document.getElementById("wrapper");
    const offset = window.innerWidth * 0.05;

    let players = Array.from({length: 13}, (_, i) => ({
        name: "Player " + (i + 1)
    }));

    function createMatch(x, y, a, b=null, isChampion=false) {

        const el = document.createElement("div");
        el.className = "glass-card";

        el.style.left = x + "px";
        el.style.top = y + "px";

        // ===== ЧЕМПИОН (ЦЕНТРИРОВАННЫЙ) =====
        if (isChampion) {
            el.innerHTML = `
                <div class="row">
                    ЧЕМПИОН
                </div>
                <div class="row">
                    <b>${a.name}</b>
                </div>
            `;
        }
        // ===== ОБЫЧНЫЙ МАТЧ =====
        else if (!b) {
            el.innerHTML = `
                <div class="row">${a.name}</div>
            `;
        }
        else {
            el.innerHTML = `
                <div class="row">${a.name}</div>
                <div class="row">${b.name}</div>
            `;
        }

        wrapper.appendChild(el);

        return { yCenter: y + cardH / 2 };
    }

    function run(list) {

        let round = 0;
        let currentMatches = [];

        // 1 раунд
        for (let i = 0; i < list.length; i += 2) {

            const a = list[i];
            const b = list[i + 1];

            const y = i * stepY;

            createMatch(offset + round * stepX, y, a, b);

            const winner = (!b)
                ? a
                : (Math.random() > 0.5 ? a : b);

            currentMatches.push({
                y: y + cardH / 2,
                data: winner
            });
        }

        round++;

        // раунды
        while (currentMatches.length > 1) {

            const next = [];

            for (let i = 0; i < currentMatches.length; i += 2) {

                const A = currentMatches[i];
                const B = currentMatches[i + 1];

                const yCenter = B ? (A.y + B.y) / 2 : A.y;
                const y = yCenter - cardH / 2;

                createMatch(offset + round * stepX, y, A.data, B?.data);

                const winner =
                    (!B) ? A.data :
                    (Math.random() > 0.5 ? A.data : B.data);

                next.push({
                    y: yCenter,
                    data: winner
                });
            }

            currentMatches = next;
            round++;
        }

        // ===== ЧЕМПИОН =====
        if (currentMatches.length === 1) {

            const champ = currentMatches[0];

            createMatch(
                offset + round * stepX,
                champ.y - cardH / 2,
                champ.data,
                null,
                true
            );
        }
    }

    run(players);

});

</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
