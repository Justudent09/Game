<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Bracket Gold Champion</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            overflow: hidden; 
            color: var(--tg-theme-text-color, white); 
        }
        .bg { 
            position: fixed; 
            inset: 0; 
            background: url('image/e37fc075a514c3bb2ea94d6349ea34ba.jpg') center/cover no-repeat; 
            z-index: -1; 
        }
        .scroll-area { 
            position: absolute; 
            inset: 0; 
            overflow: auto; 
            box-sizing: border-box; 
        }
        .wrapper { 
            margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
            position: relative; 
            display: inline-block; 
        }

        .glass-card { 
            position: absolute; 
            width: 200px; 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px); 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            overflow: hidden; 
            cursor: pointer; 
        }

        .champion-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.1em;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
            text-transform: uppercase;
        }

        .row { 
            padding: 10px 12px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .row:last-child { border-bottom: none; }
        .line { position: absolute; background: rgba(255,255,255,0.2); }
        .h-line { height: 2px; }
        .v-line { width: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scroll-area">
        <div class="wrapper" id="wrapper"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
