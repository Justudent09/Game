<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Bracket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            color: var(--tg-theme-text-color, white); 
            height: 100vh;
            background: #000;
        }

        .bg { 
            position: fixed; 
            inset: 0; 
            background: url('image/f3285d30bff0ae4d484989ed725e356f.jpg') center/cover no-repeat; 
            z-index: -1; 
        }

        .scroll-area { 
            position: absolute; 
            inset: 0; 
            overflow-x: auto; 
            overflow-y: hidden; 
            -webkit-overflow-scrolling: touch;
        }

        .wrapper { 
            /* Динамический отступ сверху от Telegram */
            margin-top: calc(var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top));
            /* Отступы по бокам */
            padding: 0 5vw;
            position: relative; 
            display: inline-block; 
            /* Высота ровно под экран за вычетом отступа */
            height: calc(100vh - (var(--tg-content-safe-area-inset-top) + var(--tg-safe-area-inset-top)));
            box-sizing: border-box;
            vertical-align: top;
        }

        .glass-card { 
            position: absolute; 
            width: 200px; 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px); 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            overflow: hidden; 
            cursor: pointer; 
            z-index: 10;
        }

        .champion-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.1em;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
            text-transform: uppercase;
        }

        .row { 
            padding: 10px 12px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row:last-child { border-bottom: none; }

        .line { position: absolute; background: rgba(255,255,255,0.2); pointer-events: none; }
        .h-line { height: 2px; }
        .v-line { width: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scroll-area">
        <div class="wrapper" id="wrapper"></div>
    </div>

    <script src="players.js"></script>
    <script src="app.js"></script>
</body>
</html>
