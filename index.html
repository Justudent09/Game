<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tournament Bracket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Переменные для отступов с дефолтными значениями, если Telegram не передал свои */
            --safe-top: var(--tg-content-safe-area-inset-top, var(--tg-safe-area-inset-top, 20px));
        }

        body { 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000;
            color: var(--tg-theme-text-color, #fff);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .bg { 
            position: fixed; 
            inset: 0; 
            background: url('image/e37fc075a514c3bb2ea94d6349ea34ba.jpg') center/cover no-repeat; 
            z-index: -1; 
        }

        .scroll-area { 
            width: 100%;
            height: 100%;
            overflow-x: auto; 
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex;
        }

        .wrapper { 
            position: relative; 
            margin-top: var(--safe-top);
            padding: 20px 5vw;
            /* Высота за вычетом отступа и небольшого запаса снизу */
            height: calc(100vh - var(--safe-top) - 40px);
            min-height: 400px; 
            display: inline-block;
            box-sizing: border-box;
        }

        .glass-card { 
            position: absolute; 
            width: 180px; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .row { 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row:last-child { border-bottom: none; }

        .champion-text {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            text-transform: uppercase;
        }

        .line { position: absolute; background: rgba(255, 255, 255, 0.3); pointer-events: none; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scroll-area">
        <div class="wrapper" id="wrapper"></div>
    </div>
    <script src="players.js"></script>
    <script src="app.js"></script>
</body>
</html>
